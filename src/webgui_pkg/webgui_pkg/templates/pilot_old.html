<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Pilot Control Interface</title>
    <link rel="stylesheet" href="../static/css/pilot.css"/>

    <script src="{{url_for('static', filename='js/resources/roslib.min.js')}}"></script>
    <script src="{{url_for('static', filename='js/resources/eventemitter2.min.js')}}"></script>
    <script src="{{url_for('static', filename='js/ros_setup.js')}}"></script>
    <script src="{{url_for('static', filename='js/gamepad_setup.js')}}" defer></script>
    <script src="{{url_for('static', filename='js/pilot.js')}}" defer></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #main-camera-frame {
            height: auto;
            width: 100vw;
        }
        #camera-frame {
            width: 100vw;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <img id="pride" src="{{url_for('static', filename='images/chicago_flag.jpg')}}">
    <div id="camera-wrapper">
        <!-- Camera Feed: OpenCV MJPEG via Flask /video_feed (/dev/video0)     -->
        <!-- pilot.js also subscribes to /d455/color/image_raw/compressed and  -->
        <!-- will overwrite src on #main-camera-frame when that topic is live.  -->
        <!-- NOTE: Using a canvas element may be better                         -->
        <button onclick="toggleFullscreen()" class="fullscreen-button">🔳 Fullscreen</button>
        <img id="main-camera-frame" src="/video_feed" />

        <!-- kept so pilot.js top-level `const img = getElementById("camera-output")` doesn't throw -->
        <img id="camera-output" style="display:none;" />
    </div>
</body>
</html>
